<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="60%" stop-color="#F0EBFF"/>
      <stop offset="100%" stop-color="#EDE9FE"/>
    </linearGradient>
    <linearGradient id="blob1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C7D2FE" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#DDD6FE" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="blob2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A5B4FC" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#C4B5FD" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="iconFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#6366F1" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background fills entire viewport -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Soft blobs -->
  <ellipse cx="680" cy="60" rx="260" ry="200" fill="url(#blob1)"/>
  <ellipse cx="120" cy="390" rx="200" ry="160" fill="url(#blob2)"/>
  <circle cx="760" cy="380" r="90" fill="#C7D2FE" fill-opacity="0.25"/>
  <circle cx="60" cy="70" r="60" fill="#DDD6FE" fill-opacity="0.3"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.2" fill="#818CF8" fill-opacity="0.18"/>
  </pattern>
  <rect width="800" height="450" fill="url(#dots)"/>

  <!-- Card: calendar icon -->
  <rect x="306" y="108" width="188" height="188" rx="32" fill="white" fill-opacity="0.9" filter="url(#softShadow)"/>

  <!-- Calendar icon body -->
  <rect x="336" y="152" width="128" height="116" rx="14" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="2"/>
  <!-- Calendar header -->
  <rect x="336" y="152" width="128" height="36" rx="14" fill="url(#iconFill)"/>
  <rect x="336" y="174" width="128" height="14" fill="url(#iconFill)"/>
  <!-- Ring handles -->
  <rect x="358" y="143" width="11" height="22" rx="5.5" fill="#8B5CF6"/>
  <rect x="431" y="143" width="11" height="22" rx="5.5" fill="#8B5CF6"/>
  <!-- Grid dots row 1 -->
  <circle cx="358" cy="218" r="5" fill="#6366F1" fill-opacity="0.55"/>
  <circle cx="380" cy="218" r="5" fill="#6366F1" fill-opacity="0.55"/>
  <circle cx="402" cy="218" r="5" fill="#6366F1" fill-opacity="0.55"/>
  <circle cx="424" cy="218" r="5" fill="#6366F1" fill-opacity="0.55"/>
  <circle cx="446" cy="218" r="5" fill="#6366F1" fill-opacity="0.55"/>
  <!-- Grid dots row 2 — highlighted center -->
  <circle cx="358" cy="242" r="5" fill="#6366F1" fill-opacity="0.3"/>
  <circle cx="380" cy="242" r="5" fill="#6366F1" fill-opacity="0.3"/>
  <circle cx="402" cy="242" r="7" fill="#6366F1"/>
  <circle cx="424" cy="242" r="5" fill="#6366F1" fill-opacity="0.3"/>
  <circle cx="446" cy="242" r="5" fill="#6366F1" fill-opacity="0.3"/>

  <!-- Label text -->
  <text x="400" y="330" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#6366F1" fill-opacity="0.8" text-anchor="middle" letter-spacing="0.3">Campus Event</text>
  <text x="400" y="354" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="400" fill="#94A3B8" text-anchor="middle">No image available</text>
</svg>
